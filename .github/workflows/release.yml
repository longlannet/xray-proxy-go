name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build and publish release
    runs-on: ubuntu-latest
    env:
      # 优先用新名 PROXYSCENE_MINISIGN_SECRET_KEY，回退旧名 XRAY_PROXY_MINISIGN_SECRET_KEY，
      # 以便平滑改名：可先在仓库 Settings 新增同值的 PROXYSCENE_MINISIGN_SECRET_KEY，再删旧的。
      PROXYSCENE_MINISIGN_SECRET_KEY: ${{ secrets.PROXYSCENE_MINISIGN_SECRET_KEY || secrets.XRAY_PROXY_MINISIGN_SECRET_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: false
      - name: Test
        run: go test ./...
      - name: Vet
        run: go vet ./...
      - name: Build artifacts
        shell: bash
        env:
          # 固定 Xray 版本以保证可复现构建（不跟 latest 漂移）。升级 Xray 时手动 bump 此处、
          # build-bundle.sh、install.sh 的默认值（以及 xxv 镜像 SHA256）。
          XRAY_RELEASE_BASE: https://github.com/XTLS/Xray-core/releases/download/v26.3.27
          VERSION: ${{ github.ref_name }}
          COMMIT: ${{ github.sha }}
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y unzip
          # 构建逻辑统一在 scripts/build-bundle.sh（CI 以 dry-run 验证）。
          scripts/build-bundle.sh
      - name: Sign artifacts
        if: ${{ env.PROXYSCENE_MINISIGN_SECRET_KEY != '' }}
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y minisign
          cleanup() {
            rm -f minisign.key
          }
          trap cleanup EXIT
          printf '%s' "$PROXYSCENE_MINISIGN_SECRET_KEY" > minisign.key
          chmod 600 minisign.key
          # 签名 checksums.txt（联机安装校验用）。
          minisign -S -W -m dist/checksums.txt -s minisign.key -x dist/checksums.txt.minisig
          # 逐个签名离线整合包（离线安装用内置公钥直接验 .minisig）。
          for b in dist/proxyscene_bundle_linux_*.tar.gz; do
            minisign -S -W -m "$b" -s minisign.key -x "$b.minisig"
          done
      - name: Require signatures on canonical repo
        # 防止"签名 Secret 缺失时静默发布未签名产物"：官方仓库必须有签名才放行；
        # fork（github.repository 不同）缺少 Secret 属正常，跳过此检查。
        if: ${{ github.repository == 'longlannet/proxyscene' }}
        shell: bash
        run: |
          set -euo pipefail
          test -f dist/checksums.txt.minisig || { echo "缺少 checksums.txt.minisig（签名 Secret 是否丢失？）"; exit 1; }
          for f in dist/proxyscene_bundle_linux_*.tar.gz; do
            test -f "$f.minisig" || { echo "缺少签名：$f.minisig"; exit 1; }
          done
          echo "所有产物签名齐全"
      - name: Publish GitHub release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          files: dist/*
          generate_release_notes: true
